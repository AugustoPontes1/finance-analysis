version: '3.9'


services:
  # ========== DJANGO APP ==========
  django:
    build:
      context: backend
      dockerfile: backend/Dockerfile.dev
      args:
        APP_PORT: ${DJANGO_APP_PORT}
    container_name: finance-analysis-django
    volumes:
      - .:/app
      - /app/venv
    ports:
      - "${DJANGO_APP_PORT}:${DJANGO_APP_PORT}"
    environment:
      - PORT=${DJANGO_APP_PORT}
      - DJANGO_APP_PORT=${DJANGO_APP_PORT}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,django
      - SEAWEEDFS_MASTER_URL=http://seaweed-master:9333
      - SEAWEEDFS_VOLUME_URL=http://seaweed-volume:8080
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/finance_analysis
      - SECRET_KEY=${SECRET_KEY}
      - PYTHONPATH=/app/backend
    depends_on:
      postgres:
        condition: service_healthy
      seaweed-master:
        condition: service_healthy
      seaweed-volume:
        condition: service_healthy
    networks:
      - finance-network-dev
    stdin_open: true
    tty: true

  streamlit:
    build:
      context: frontend
      dockerfile: frontend/Dockerfile.dev
    container_name: finance-analysis-streamlit
    volumes:
      - .:/app                     # hot-reload: edits reflect instantly
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://django:${DJANGO_APP_PORT}
    depends_on:
      - django
    networks:
      - finance-network-dev

  # ========== POSTGRESQL DATABASE ==========
  postgres:
    image: postgres:15-alpine
    container_name: finance-analysis-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=finance_analysis
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    networks:
      - finance-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== SEAWEEDFS MASTER ==========
  seaweed-master:
    image: chrislusf/seaweedfs:latest
    container_name: finance-analysis-seaweed-master
    user: root
    ports:
      - "9333:9333"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mkdir -p /data/seaweed-master &&
      chmod 777 /data/seaweed-master &&
      weed master
      -ip=seaweed-master
      -ip.bind=0.0.0.0
      -port=9333
      -mdir=/data/seaweed-master"
    volumes:
      - ./data/seaweed-master:/data/seaweed-master
    networks:
      - finance-network-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9333/dir/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== SEAWEEDFS VOLUME ==========
  seaweed-volume:
    image: chrislusf/seaweedfs:latest
    container_name: finance-analysis-seaweed-volume
    user: root
    ports:
      - "8080:8080"
      - "18080:18080"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mkdir -p /data/seaweed-volume &&
      chmod 777 /data/seaweed-volume &&
      weed volume
      -ip=seaweed-volume
      -ip.bind=0.0.0.0
      -port=8080
      -master=seaweed-master:9333
      -dir=/data/seaweed-volume
      -mserver=seaweed-master:9333"
    volumes:
      - ./data/seaweed-volume:/data/seaweed-volume
    depends_on:
      - seaweed-master
    networks:
      - finance-network-dev
    environment:
      - WEED_MASTER=seaweed-master:9333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 45s
      timeout: 35s
      retries: 10
      start_period: 50s

volumes:
  postgres_data:

networks:
  finance-network-dev:
    driver: bridge